spring:
  ## Common ##
  application:
    name: QuestEngineV2

  ## Database ##
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/qe_v2_db
    username: admin
    password: admin

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true
        ddl-auto: validate

  # Flyway configuration
  flyway:
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false
    ignore-unsupported-database: true
    driver: org.postgresql.Driver

jwt:
  secret: ${JWT_SECRET:OMGItsQuestEngineV2JWTSuperSecureTokenMadeByDN}
  expiration: 86400000
