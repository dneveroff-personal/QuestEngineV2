# Quest Engine V2 (host-build)
# Workflow: ./gradlew clean build -x test → docker compose -f docker-compose.yml up -d --build
services:

  postgres:
    image: postgres:16-alpine
    container_name: qe-v2-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin}
      POSTGRES_DB: ${POSTGRES_DB:-qe_v2_db}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - qe_v2_db_data:/var/lib/postgresql/data
    networks:
      - qe-v2-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M

# ======================
# Volumes
# ======================
volumes:
  qe_v2_db_data:

# ======================
# Networks
# ======================
networks:
  qe-v2-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/16
